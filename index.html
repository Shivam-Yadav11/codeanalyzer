    <div class="glow-blob"></div>
    <div class="glow-blob"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-ring"></div>
        <div class="loader-text">Analyzing your code and Generat Tokens...</div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="main-wrapper">
        <header>
            <div class="logo-icon">
                <i class="fas fa-code"></i>
            </div>
            <h1>Smart Code Analyzer with Tokens </h1>
            <p>Created by Khushboo Shah, Shivam Kumar Yadav, Santosh Chaudhary and Shivanshu Shukla</p>
            <p>Paste your code and get instant deep analysis</p>
        </header>

        <section class="input-section">
            <div class="editor-team-row">
                <div class="editor-col">
                    <div class="editor-wrapper">
                        <div class="editor-topbar">
                            <div class="editor-dots">
                                <span></span><span></span><span></span>
                            </div>
                            <div class="lang-badge" id="langBadge">auto-detect</div>
                        </div>
                        <div class="editor-body">
                            <div class="line-numbers" id="lineNumbers"></div>
                            <textarea id="codeInput" placeholder="" spellcheck="false" aria-label="Code input editor"
                                style="height: 532px;"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-primary" id="analyzeBtn" onclick="handleAnalyze(event)"
                    aria-label="Analyze code">
                    <i class="fas fa-bolt"></i> Analyze Code
                </button>
                <button class="btn btn-secondary" onclick="loadSample('js')" aria-label="Load JavaScript sample">
                    <i class="fab fa-js-square"></i> JS Sample
                </button>
                <button class="btn btn-secondary" onclick="loadSample('py')" aria-label="Load Python sample">
                    <i class="fab fa-python"></i> Python Sample
                </button>
                <button class="btn btn-secondary" onclick="loadSample('cpp')" aria-label="Load C++ sample">
                    <i class="fas fa-microchip"></i> C++ Sample
                </button>
                <button class="btn btn-secondary" onclick="clearEditor()" aria-label="Clear editor">
                    <i class="fas fa-eraser"></i> Clear
                </button>
            </div>
        </section>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="stat-value" id="statLines">0</div>
                <div class="stat-label">Lines</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statVars">0</div>
                <div class="stat-label">Variables</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statFuncs">0</div>
                <div class="stat-label">Functions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statLoops">0</div>
                <div class="stat-label">Loops</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statIssues">0</div>
                <div class="stat-label">Issues</div>
            </div>
        </div>

        <section class="output-section" id="outputSection">
            <div class="result-grid" id="resultGrid"></div>
        </section>
    </div>

    <script type="importmap">

        }
    }
    </script>
